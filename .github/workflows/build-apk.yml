name: Build APK Flutter

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL file ZIP project Flutter'
        required: true
        type: string
      sdk_version:
        description: 'Android SDK Version'
        required: true
        default: '34'
        type: string
      build_mode:
        description: 'Build Mode (release/debug)'
        required: true
        default: 'release'
        type: string
      job_id:
        description: 'Job ID untuk tracking'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter SDK (Latest)
        uses: subosito/flutter-action@v2
        with:
          channel: 'master'
          cache: true

      - name: Flutter Version
        run: flutter --version

      - name: Download Project ZIP
        run: |
          curl -L -o project.zip "${{ github.event.inputs.zip_url }}"
          mkdir -p project_temp
          unzip -q project.zip -d project_temp/
          rm project.zip

      - name: Find and Move Flutter Project
        id: finder
        run: |
          cd project_temp
          PROJ_DIR=$(find . -name "pubspec.yaml" -printf "%h\n" | head -1)
          if [ -z "$PROJ_DIR" ]; then
            echo "pubspec.yaml not found!"
            exit 1
          fi
          PROJ_DIR="${PROJ_DIR#./}"
          echo "Original project directory: $PROJ_DIR"
          
          if [ "$PROJ_DIR" != "." ]; then
            mv "$PROJ_DIR"/* ./ 2>/dev/null || true
            mv "$PROJ_DIR"/.[!.]* ./ 2>/dev/null || true
            rm -rf "$PROJ_DIR"
          fi
          
          cd ..
          mv project_temp ./project
          echo "PROJECT_DIR=./project" >> $GITHUB_OUTPUT

      - name: Auto Detect and Fix SDK Version
        run: |
          if [ -f "project/pubspec.yaml" ]; then
            echo "Original pubspec.yaml:"
            cat project/pubspec.yaml | grep "sdk:"
            
            # Detect current SDK requirement
            CURRENT_SDK=$(grep "sdk:" project/pubspec.yaml | head -1 | sed 's/.*sdk: //')
            echo "Current SDK requirement: $CURRENT_SDK"
            
            # Always fix to compatible version
            sed -i 's/sdk: .*/sdk: ^3.8.1/' project/pubspec.yaml
            
            echo "Fixed pubspec.yaml:"
            cat project/pubspec.yaml | grep "sdk:"
          fi

      - name: List Project Structure
        run: |
          ls -la project/
          if [ -f "project/pubspec.yaml" ]; then
            echo "pubspec.yaml found"
          else
            echo "pubspec.yaml not found"
            exit 1
          fi

      - name: Read Project Name
        id: project_name
        run: |
          PROJECT_NAME=$(grep "^name:" project/pubspec.yaml | cut -d' ' -f2)
          echo "PROJECT_NAME=$PROJECT_NAME" >> $GITHUB_OUTPUT

      - name: Update Android SDK Version
        run: |
          SDK_VERSION="${{ github.event.inputs.sdk_version }}"
          
          if [ -f "project/android/app/build.gradle" ]; then
            sed -i "s/compileSdkVersion [0-9]*/compileSdkVersion $SDK_VERSION/" project/android/app/build.gradle
            sed -i "s/targetSdkVersion [0-9]*/targetSdkVersion $SDK_VERSION/" project/android/app/build.gradle
          fi
          
          if [ -f "project/android/app/build.gradle.kts" ]; then
            sed -i "s/compileSdk = [0-9]*/compileSdk = $SDK_VERSION/" project/android/app/build.gradle.kts
            sed -i "s/targetSdk = [0-9]*/targetSdk = $SDK_VERSION/" project/android/app/build.gradle.kts
          fi
          
          mkdir -p project/android
          echo "sdk.dir=$ANDROID_HOME" > project/android/local.properties

      - name: Flutter Clean
        run: |
          cd project
          flutter clean || true
          rm -rf .dart_tool .gradle build

      - name: Flutter Pub Get
        run: |
          cd project
          flutter pub get

      - name: Build APK
        id: build
        run: |
          cd project
          
          if [ "${{ github.event.inputs.build_mode }}" = "release" ]; then
            flutter build apk --release
            APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          else
            flutter build apk --debug
            APK_PATH="build/app/outputs/flutter-apk/app-debug.apk"
          fi
          
          if [ ! -f "$APK_PATH" ]; then
            if [ -f "build/app/outputs/apk/release/app-release.apk" ]; then
              APK_PATH="build/app/outputs/apk/release/app-release.apk"
            else
              echo "No APK found"
              exit 1
            fi
          fi
          
          echo "APK_PATH=$APK_PATH" >> $GITHUB_OUTPUT
          ls -lh "$APK_PATH"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.event.inputs.build_mode }}
          path: project/${{ steps.build.outputs.APK_PATH }}
          retention-days: 7

      - name: Upload Debug Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: |
            project/build/
            ~/.gradle/
          retention-days: 3

      - name: Build Summary
        run: |
          echo "=========================================="
          echo "BUILD SUMMARY"
          echo "=========================================="
          echo "Job ID: ${{ github.event.inputs.job_id }}"
          echo "Project: ${{ steps.project_name.outputs.PROJECT_NAME }}"
          echo "Status: SUCCESS"
          echo "=========================================="
            
