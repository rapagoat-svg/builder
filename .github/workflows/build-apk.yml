name: Build APK Flutter

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL file ZIP project Flutter'
        required: true
        type: string
      sdk_version:
        description: 'Android SDK Version'
        required: true
        default: '34'
        type: string
      build_mode:
        description: 'Build Mode'
        required: true
        default: 'release'
        type: string
      job_id:
        description: 'Job ID'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Download ZIP
        run: |
          curl -L -o project.zip "${{ github.event.inputs.zip_url }}"
          unzip -q project.zip -d project/
          ls -la project/

      - name: Find Project
        id: finder
        run: |
          cd project
          PROJECT_DIR=$(find . -name "pubspec.yaml" -printf "%h\n" | head -1)
          if [ -z "$PROJECT_DIR" ]; then
            echo "pubspec.yaml not found!"
            exit 1
          fi
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_OUTPUT
          echo "Found at: $PROJECT_DIR"

      - name: Fix Android SDK Version
        run: |
          cd project/${{ steps.finder.outputs.PROJECT_DIR }}
          if [ -f "android/app/build.gradle" ]; then
            sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion ${{ github.event.inputs.sdk_version }}/' android/app/build.gradle
            sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion ${{ github.event.inputs.sdk_version }}/' android/app/build.gradle
          fi
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Flutter Clean
        run: |
          cd project/${{ steps.finder.outputs.PROJECT_DIR }}
          flutter clean

      - name: Flutter Pub Get
        run: |
          cd project/${{ steps.finder.outputs.PROJECT_DIR }}
          flutter pub get

      - name: Build APK
        id: build
        run: |
          cd project/${{ steps.finder.outputs.PROJECT_DIR }}
          if [ "${{ github.event.inputs.build_mode }}" = "release" ]; then
            flutter build apk --release
          else
            flutter build apk --debug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.event.inputs.build_mode }}
          path: project/${{ steps.finder.outputs.PROJECT_DIR }}/build/app/outputs/flutter-apk/*.apk
          retention-days: 7
