name: Build APK Flutter

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL file ZIP project Flutter'
        required: true
        type: string
      sdk_version:
        description: 'Android SDK Version'
        required: true
        default: '34'
        type: string
      build_mode:
        description: 'Build Mode (release/debug)'
        required: true
        default: 'release'
        type: string
      job_id:
        description: 'Job ID untuk tracking'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter SDK (Dart 3.8.1)
        uses: subosito/flutter-action@v2
        with:
          channel: 'master'

      - name: Download Project ZIP
        run: |
          echo "Downloading from: ${{ github.event.inputs.zip_url }}"
          curl -L -o project.zip "${{ github.event.inputs.zip_url }}"
          if [ ! -f project.zip ]; then
            echo "Error: Failed to download ZIP file"
            exit 1
          fi
          unzip -q project.zip
          rm project.zip
          echo "Extracted successfully"

      - name: Find and Move Flutter Project to Root
        id: finder
        run: |
          PROJ_DIR=$(find . -name "pubspec.yaml" -printf "%h\n" | head -1)
          if [ -z "$PROJ_DIR" ]; then
            echo "Error: pubspec.yaml not found!"
            exit 1
          fi
          PROJ_DIR="${PROJ_DIR#./}"
          echo "Found project at: $PROJ_DIR"
          
          if [ "$PROJ_DIR" != "." ] && [ -n "$PROJ_DIR" ]; then
            echo "Moving contents to root..."
            mv "$PROJ_DIR"/* ./ 2>/dev/null || true
            mv "$PROJ_DIR"/.[!.]* ./ 2>/dev/null || true
            rm -rf "$PROJ_DIR"
          fi
          echo "Project moved to root successfully"
          ls -la

      - name: Fix pubspec.yaml - SDK and Dependencies
        run: |
          echo "===== ORIGINAL pubspec.yaml ====="
          cat pubspec.yaml
          
          # Fix SDK constraint to support 3.8.1
          sed -i 's/sdk: .*/sdk: ">=3.0.0 <4.0.0"/' pubspec.yaml
          
          # Remove all problematic dependencies completely
          sed -i '/font_awesome_flutter/d' pubspec.yaml
          sed -i '/icon_data/d' pubspec.yaml
          sed -i '/flutter_lints/d' pubspec.yaml
          sed -i '/flutter_native_splash/d' pubspec.yaml
          sed -i '/flutter_launcher_icons/d' pubspec.yaml
          sed -i '/pretty_dio_logger/d' pubspec.yaml
          sed -i '/dio/d' pubspec.yaml
          sed -i '/http/d' pubspec.yaml
          
          # Add minimal working dependencies if needed
          if ! grep -q "cupertino_icons:" pubspec.yaml; then
            echo "  cupertino_icons: ^1.0.6" >> pubspec.yaml
          fi
          
          echo "===== FIXED pubspec.yaml ====="
          cat pubspec.yaml

      - name: Update Android SDK Version in build.gradle
        run: |
          SDK_VERSION="${{ github.event.inputs.sdk_version }}"
          
          if [ -f "android/app/build.gradle" ]; then
            sed -i "s/compileSdkVersion [0-9]*/compileSdkVersion $SDK_VERSION/" android/app/build.gradle
            sed -i "s/targetSdkVersion [0-9]*/targetSdkVersion $SDK_VERSION/" android/app/build.gradle
            sed -i "s/minSdkVersion [0-9]*/minSdkVersion 21/" android/app/build.gradle
            echo "build.gradle updated"
          fi
          
          if [ -f "android/app/build.gradle.kts" ]; then
            sed -i "s/compileSdk = [0-9]*/compileSdk = $SDK_VERSION/" android/app/build.gradle.kts
            sed -i "s/targetSdk = [0-9]*/targetSdk = $SDK_VERSION/" android/app/build.gradle.kts
            echo "build.gradle.kts updated"
          fi
          
          # Create local.properties
          mkdir -p android
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "local.properties created"

      - name: Clean Flutter Project
        run: |
          flutter clean || true
          rm -rf .dart_tool .gradle build pubspec.lock 2>/dev/null || true
          echo "Clean completed"

      - name: Get Flutter Dependencies
        run: |
          flutter pub get
          if [ $? -ne 0 ]; then
            echo "Pub get failed, trying with --no-example..."
            flutter pub get --no-example
          fi
          echo "Dependencies resolved"

      - name: Build APK
        id: build
        run: |
          if [ "${{ github.event.inputs.build_mode }}" = "release" ]; then
            echo "Building RELEASE APK..."
            flutter build apk --release
            APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          else
            echo "Building DEBUG APK..."
            flutter build apk --debug
            APK_PATH="build/app/outputs/flutter-apk/app-debug.apk"
          fi
          
          # Try alternative path if not found
          if [ ! -f "$APK_PATH" ]; then
            if [ -f "build/app/outputs/apk/release/app-release.apk" ]; then
              APK_PATH="build/app/outputs/apk/release/app-release.apk"
            elif [ -f "build/app/outputs/apk/debug/app-debug.apk" ]; then
              APK_PATH="build/app/outputs/apk/debug/app-debug.apk"
            else
              echo "ERROR: APK not found!"
              find . -name "*.apk" 2>/dev/null
              exit 1
            fi
          fi
          
          echo "APK_PATH=$APK_PATH" >> $GITHUB_OUTPUT
          APK_SIZE=$(ls -lh "$APK_PATH" | awk '{print $5}')
          echo "APK_SIZE=$APK_SIZE" >> $GITHUB_OUTPUT
          echo "✅ APK built successfully! Size: $APK_SIZE"
          ls -lh "$APK_PATH"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.event.inputs.build_mode }}-sdk${{ github.event.inputs.sdk_version }}
          path: ${{ steps.build.outputs.APK_PATH }}
          retention-days: 7

      - name: Upload Debug Logs (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: |
            pubspec.yaml
            android/app/build.gradle
            build/
            .dart_tool/
          retention-days: 3

      - name: Build Summary
        run: |
          echo "=========================================="
          echo "✅ BUILD SUMMARY ✅"
          echo "=========================================="
          echo "Job ID: ${{ github.event.inputs.job_id }}"
          echo "Project Name: $(grep '^name:' pubspec.yaml | cut -d' ' -f2)"
          echo "SDK Version: ${{ github.event.inputs.sdk_version }}"
          echo "Build Mode: ${{ github.event.inputs.build_mode }}"
          echo "APK Size: ${{ steps.build.outputs.APK_SIZE }}"
          echo "Status: SUCCESS"
          echo "=========================================="
      
