name: Build APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP'
        required: true
        type: string
      sdk_version:
        description: 'SDK'
        required: true
        default: '34'
        type: string
      build_mode:
        description: 'Mode'
        required: true
        default: 'release'
        type: string
      job_id:
        description: 'Job ID'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      - name: Download
        run: |
          curl -L -o a.zip "${{ inputs.zip_url }}"
          unzip -q a.zip -d p
      - name: Build
        run: |
          cd p
          DIR=$(find . -name "pubspec.yaml" -printf "%h\n" | head -1)
          cd "$DIR"
          flutter pub get
          flutter build apk --release
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: p/**/build/app/outputs/flutter-apk/*.apk
