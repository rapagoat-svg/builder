name: Build APK from Telegram Bot

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform (android_sdk / flutter)'
        required: true
        type: choice
        options:
          - android_sdk
          - flutter
      build_type:
        description: 'Build Type (debug / release)'
        required: true
        type: choice
        options:
          - debug
          - release
      user_id:
        description: 'Telegram User ID'
        required: true
        type: string
      chat_id:
        description: 'Telegram Chat ID'
        required: true
        type: string
      message_id:
        description: 'Telegram Message ID'
        required: true
        type: string
      build_id:
        description: 'Build ID'
        required: true
        type: string
      zip_url:
        description: 'URL ZIP project (optional)'
        required: false
        type: string
      repo_url:
        description: 'GitHub Repository URL (optional)'
        required: false
        type: string

permissions:
  contents: read
  actions: write
  checks: write

env:
  BUILD_ID: ${{ github.event.inputs.build_id }}
  PLATFORM: ${{ github.event.inputs.platform }}
  BUILD_TYPE: ${{ github.event.inputs.build_type }}
  CHAT_ID: ${{ github.event.inputs.chat_id }}
  MESSAGE_ID: ${{ github.event.inputs.message_id }}
  USER_ID: ${{ github.event.inputs.user_id }}
  FLUTTER_VERSION: 3.8.1
  JAVA_VERSION: 17

jobs:
  build-apk:
    name: Build APK - ${{ github.event.inputs.platform }} (${{ github.event.inputs.build_type }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update status - 0%
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/editMessageText" \
            --data-urlencode "chat_id=${{ env.CHAT_ID }}" \
            --data-urlencode "message_id=${{ env.MESSAGE_ID }}" \
            --data-urlencode "text=🚀 Build dimulai

          Mode: ${{ env.BUILD_TYPE }}
          Build ID: ${{ env.BUILD_ID }}

          ▱▱▱▱▱▱▱▱▱▱ 0%
          ⚙️ Menginisialisasi..." \
            -d "parse_mode=Markdown" || true

      - name: Get Flutter project source
        run: |
          mkdir -p flutter_project
          cd flutter_project

          if [ -n "${{ github.event.inputs.zip_url }}" ]; then
            echo "Downloading ZIP..."
            curl -L -o project.zip "${{ github.event.inputs.zip_url }}"
            unzip -q project.zip
            rm project.zip

          elif [ -n "${{ github.event.inputs.repo_url }}" ]; then
            echo "Cloning repo..."
            git clone "${{ github.event.inputs.repo_url }}" .

          else
            echo "Creating demo Flutter project..."
            flutter create --org com.build --project-name build_app .

            cat << 'EOF' > pubspec.yaml
          name: build_app
          description: A Flutter demo project
          publish_to: 'none'
          version: 1.0.0+1
          environment:
            sdk: ^3.0.0
          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.6
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0
          flutter:
            uses-material-design: true
          EOF

            cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          void main() { runApp(const MyApp()); }
          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                home: Scaffold(
                  appBar: AppBar(title: const Text('Build Success')),
                  body: const Center(child: Text('Build Berhasil!')),
                ),
              );
            }
          }
          EOF
          fi

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Update status - 25%
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/editMessageText" \
            --data-urlencode "chat_id=${{ env.CHAT_ID }}" \
            --data-urlencode "message_id=${{ env.MESSAGE_ID }}" \
            --data-urlencode "text=🚀 Build berjalan...

          Mode: ${{ env.BUILD_TYPE }}

          ▰▰▰▱▱▱▱▱▱▱ 25%
          📦 Install dependencies..." \
            -d "parse_mode=Markdown" || true

      - name: Flutter clean & get dependencies
        working-directory: ./flutter_project
        run: |
          PROJECT_DIR="."
          if [ ! -f "pubspec.yaml" ]; then
            PROJECT_DIR=$(find . -name "pubspec.yaml" -not -path "*/.*" | head -1 | xargs dirname)
            echo "Found pubspec.yaml at: $PROJECT_DIR"
            cd "$PROJECT_DIR"
          fi
          flutter clean
          flutter pub get

      - name: Update status - 50%
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/editMessageText" \
            --data-urlencode "chat_id=${{ env.CHAT_ID }}" \
            --data-urlencode "message_id=${{ env.MESSAGE_ID }}" \
            --data-urlencode "text=🚀 Build berjalan...

          Mode: ${{ env.BUILD_TYPE }}

          ▰▰▰▰▰▱▱▱▱▱ 50%
          🔨 Kompilasi APK..." \
            -d "parse_mode=Markdown" || true

      - name: Build Flutter APK
        working-directory: ./flutter_project
        run: |
          if [ ! -f "pubspec.yaml" ]; then
            PROJECT_DIR=$(find . -name "pubspec.yaml" -not -path "*/.*" | head -1 | xargs dirname)
            cd "$PROJECT_DIR"
          fi

          if [ "${{ env.BUILD_TYPE }}" = "debug" ]; then
            flutter build apk --debug
            APK_FILE="build/app/outputs/flutter-apk/app-debug.apk"
          else
            flutter build apk --release
            APK_FILE="build/app/outputs/flutter-apk/app-release.apk"
          fi

          echo "APK_FILE=$APK_FILE" >> $GITHUB_ENV

          if [ -f "$APK_FILE" ]; then
            echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
          else
            echo "BUILD_SUCCESS=false" >> $GITHUB_ENV
            exit 1
          fi

      - name: Update status - 75%
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/editMessageText" \
            --data-urlencode "chat_id=${{ env.CHAT_ID }}" \
            --data-urlencode "message_id=${{ env.MESSAGE_ID }}" \
            --data-urlencode "text=🚀 Build berjalan...

          Mode: ${{ env.BUILD_TYPE }}

          ▰▰▰▰▰▰▰▱▱▱ 75%
          📦 Packaging APK..." \
            -d "parse_mode=Markdown" || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ env.BUILD_TYPE }}-${{ env.BUILD_ID }}
          path: ./flutter_project/${{ env.APK_FILE }}
          retention-days: 7
          if-no-files-found: error

      - name: Update status - 100%
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/editMessageText" \
            --data-urlencode "chat_id=${{ env.CHAT_ID }}" \
            --data-urlencode "message_id=${{ env.MESSAGE_ID }}" \
            --data-urlencode "text=🚀 Build berjalan...

          Mode: ${{ env.BUILD_TYPE }}

          ▰▰▰▰▰▰▰▰▰▰ 100%
          ✅ Selesai! Mengirim APK..." \
            -d "parse_mode=Markdown" || true

      - name: Send APK via Telegram
        if: success()
        working-directory: ./flutter_project
        run: |
          APK_PATH="${{ env.APK_FILE }}"
          FILE_SIZE=$(stat -c%s "$APK_PATH" 2>/dev/null || echo "0")
          FILE_SIZE_MB=$(echo "scale=2; $FILE_SIZE / 1024 / 1024" | bc)

          curl -s \
            -F "chat_id=${{ env.CHAT_ID }}" \
            -F "document=@$APK_PATH" \
            -F "caption=✅ BUILD BERHASIL!

          Mode: ${{ env.BUILD_TYPE }}
          Build ID: ${{ env.BUILD_ID }}
          Ukuran: ${FILE_SIZE_MB} MB" \
            "https://api.telegram.org/brand/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument"

      - name: Send success notification
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ env.CHAT_ID }}" \
            --data-urlencode "text=🎉 Build selesai! APK sudah dikirim.

          Detail: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/deleteMessage" \
            -d "chat_id=${{ env.CHAT_ID }}" \
            -d "message_id=${{ env.MESSAGE_ID }}" || true

      - name: Send error notification
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ env.CHAT_ID }}" \
            --data-urlencode "text=❌ BUILD GAGAL!

          Mode: ${{ env.BUILD_TYPE }}

          Log: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/deleteMessage" \
            -d "chat_id=${{ env.CHAT_ID }}" \
            -d "message_id=${{ env.MESSAGE_ID }}" || true

      - name: Cleanup
        if: always()
        run: rm -rf ./flutter_project || true                     
