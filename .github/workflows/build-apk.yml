name: Build APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download ZIP
        run: wget -O project.zip "${{ github.event.inputs.zip_url }}"
      - name: Extract ZIP
        run: unzip project.zip -d project
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      - name: Build APK
        run: |
          cd project
          PROJECT_DIR=$(find . -name "pubspec.yaml" -type f | head -1 | xargs dirname)
          cd "$PROJECT_DIR"
          flutter pub get
          flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: "**/build/app/outputs/flutter-apk/*.apk"
