name: Build APK Flutter

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL file ZIP project Flutter'
        required: true
        type: string

      sdk_version:
        description: 'Android SDK Version'
        required: true
        default: '34'
        type: string

      build_mode:
        description: 'Build Mode'
        required: true
        default: 'release'
        type: string

      job_id:
        description: 'Job ID'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter 3.8.1
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.8.1
          channel: stable
          cache: true

      - name: Verify Flutter
        run: |
          flutter --version
          dart --version

      - name: Download ZIP Project
        run: |
          curl -L "${{ github.event.inputs.zip_url }}" -o project.zip

      - name: Extract Project
        run: |
          mkdir project_temp
          unzip -q project.zip -d project_temp
          rm -f project.zip

      - name: Find Flutter Project
        run: |
          cd project_temp

          PROJ_DIR=$(find . -name "pubspec.yaml" -printf "%h\n" | head -1)

          if [ -z "$PROJ_DIR" ]; then
            echo "pubspec.yaml not found"
            exit 1
          fi

          echo "Project Found: $PROJ_DIR"

          mkdir ../project
          cp -r "$PROJ_DIR"/* ../project/ 2>/dev/null || true
          cp -r "$PROJ_DIR"/.[!.]* ../project/ 2>/dev/null || true

      - name: Fix Dart SDK Constraint
        run: |
          if [ -f "project/pubspec.yaml" ]; then

            sed -i 's/sdk: .*/sdk: ">=2.19.0 <4.0.0"/' project/pubspec.yaml

            echo "Updated SDK Constraint:"
            grep "sdk:" project/pubspec.yaml
          fi

      - name: Set Android SDK
        run: |
          SDK_VERSION=${{ github.event.inputs.sdk_version }}

          if [ -f "project/android/app/build.gradle" ]; then
            sed -i "s/compileSdkVersion [0-9]*/compileSdkVersion $SDK_VERSION/g" project/android/app/build.gradle || true
            sed -i "s/targetSdkVersion [0-9]*/targetSdkVersion $SDK_VERSION/g" project/android/app/build.gradle || true
          fi

          if [ -f "project/android/app/build.gradle.kts" ]; then
            sed -i "s/compileSdk = [0-9]*/compileSdk = $SDK_VERSION/g" project/android/app/build.gradle.kts || true
            sed -i "s/targetSdk = [0-9]*/targetSdk = $SDK_VERSION/g" project/android/app/build.gradle.kts || true
          fi

          echo "sdk.dir=$ANDROID_HOME" > project/android/local.properties

      - name: Clean Project
        run: |
          cd project
          flutter clean || true
          rm -rf build
          rm -rf .dart_tool

      - name: Install Dependencies
        run: |
          cd project
          flutter pub get

      - name: Build APK
        run: |
          cd project

          if [ "${{ github.event.inputs.build_mode }}" = "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi

      - name: Check APK
        run: |
          find project/build -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: |
            project/build/app/outputs/flutter-apk/*.apk
            project/build/app/outputs/apk/**/*.apk
          retention-days: 7

      - name: Upload Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            project/build
            ~/.gradle
          retention-days: 3

      - name: Summary
        run: |
          echo "===================================="
          echo "BUILD SUCCESS"
          echo "===================================="
          echo "Job ID: ${{ github.event.inputs.job_id }}"
          echo "Mode: ${{ github.event.inputs.build_mode }}"
          echo "===================================="          
