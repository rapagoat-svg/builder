name: Build APK Flutter

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL file ZIP project Flutter'
        required: true
        type: string
      sdk_version:
        description: 'Android SDK Version'
        required: true
        default: '34'
        type: string
      build_mode:
        description: 'Build Mode'
        required: true
        default: 'release'
        type: string
      job_id:
        description: 'Job ID'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      - name: Download ZIP
        run: |
          curl -L -o project.zip "${{ github.event.inputs.zip_url }}"
          unzip -q project.zip -d project/
      - name: Find Project
        id: finder
        run: |
          cd project
          PROJECT_DIR=$(find . -name "pubspec.yaml" -printf "%h\n" | head -1)
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_OUTPUT
      - name: Build APK
        run: |
          cd project/${{ steps.finder.outputs.PROJECT_DIR }}
          flutter pub get
          flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: project/${{ steps.finder.outputs.PROJECT_DIR }}/build/app/outputs/flutter-apk/*.apk
