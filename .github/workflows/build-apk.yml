name: Build APK
on: 
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP'
        required: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download
        run: wget -O a.zip "${{ github.event.inputs.zip_url }}"
      - name: Extract
        run: unzip a.zip
      - name: Flutter
        uses: subosito/flutter-action@v2
      - name: Build
        run: |
          DIR=$(find . -name "pubspec.yaml" -type f | head -1 | xargs dirname)
          cd $DIR
          flutter pub get
          flutter build apk
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: "**/build/app/outputs/flutter-apk/*.apk"
