name: Build APK Flutter

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL file ZIP project Flutter'
        required: true
        type: string
      sdk_version:
        description: 'Android SDK Version'
        required: true
        default: '34'
        type: string
      build_mode:
        description: 'Build Mode (release/debug)'
        required: true
        default: 'release'
        type: string
      job_id:
        description: 'Job ID untuk tracking'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Flutter Version
        run: flutter --version

      - name: Download Project ZIP
        run: |
          echo "Downloading from: ${{ github.event.inputs.zip_url }}"
          curl -L -o project.zip "${{ github.event.inputs.zip_url }}"
          if [ ! -f project.zip ]; then
            echo "Error: Failed to download ZIP file"
            exit 1
          fi
          echo "ZIP file downloaded successfully"
          ls -la project.zip

      - name: Extract ZIP File
        run: |
          mkdir -p project_temp
          unzip -q project.zip -d project_temp/
          echo "Extracted files:"
          ls -la project_temp/

      - name: Find and Move Flutter Project (Remove Spaces from Folder Names)
        id: finder
        run: |
          cd project_temp
          
          # Find pubspec.yaml
          PROJ_DIR=$(find . -name "pubspec.yaml" -printf "%h\n" | head -1)
          if [ -z "$PROJ_DIR" ]; then
            echo "Error: pubspec.yaml not found! Invalid Flutter project."
            exit 1
          fi
          
          # Remove leading ./
          PROJ_DIR="${PROJ_DIR#./}"
          echo "Original project directory: $PROJ_DIR"
          
          # Move all contents to root (remove spaces from path)
          if [ "$PROJ_DIR" != "." ]; then
            echo "Moving contents to root to avoid spaces in path..."
            mv "$PROJ_DIR"/* ./ 2>/dev/null || true
            mv "$PROJ_DIR"/.[!.]* ./ 2>/dev/null || true
            rm -rf "$PROJ_DIR"
          fi
          
          cd ..
          mv project_temp ./project
          
          echo "PROJECT_DIR=./project" >> $GITHUB_OUTPUT
          echo "Project moved to root successfully"

      - name: List Project Structure
        run: |
          echo "Project structure:"
          ls -la project/
          if [ -f "project/pubspec.yaml" ]; then
            echo "pubspec.yaml found in root"
          else
            echo "pubspec.yaml not found in root"
            exit 1
          fi

      - name: Read Project Name from pubspec.yaml
        id: project_name
        run: |
          PROJECT_NAME=$(grep "^name:" project/pubspec.yaml | cut -d' ' -f2)
          echo "PROJECT_NAME=$PROJECT_NAME" >> $GITHUB_OUTPUT
          echo "Project name: $PROJECT_NAME"

      - name: Update Android SDK Version in build.gradle
        run: |
          SDK_VERSION="${{ github.event.inputs.sdk_version }}"
          
          echo "Setting Android SDK to API $SDK_VERSION"
          
          if [ -f "project/android/app/build.gradle" ]; then
            sed -i "s/compileSdkVersion [0-9]*/compileSdkVersion $SDK_VERSION/" project/android/app/build.gradle
            sed -i "s/targetSdkVersion [0-9]*/targetSdkVersion $SDK_VERSION/" project/android/app/build.gradle
            echo "build.gradle updated"
          fi
          
          if [ -f "project/android/app/build.gradle.kts" ]; then
            sed -i "s/compileSdk = [0-9]*/compileSdk = $SDK_VERSION/" project/android/app/build.gradle.kts
            sed -i "s/targetSdk = [0-9]*/targetSdk = $SDK_VERSION/" project/android/app/build.gradle.kts
            echo "build.gradle.kts updated"
          fi
          
          mkdir -p project/android
          echo "sdk.dir=$ANDROID_HOME" > project/android/local.properties
          echo "local.properties created"

      - name: Flutter Clean
        run: |
          cd project
          flutter clean || true
          rm -rf .dart_tool .gradle build
          echo "Flutter clean completed"

      - name: Flutter Pub Get
        run: |
          cd project
          flutter pub get
          echo "Dependencies installed successfully"

      - name: Build APK
        id: build
        run: |
          cd project
          
          if [ "${{ github.event.inputs.build_mode }}" = "release" ]; then
            echo "Building RELEASE APK..."
            flutter build apk --release
            APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          else
            echo "Building DEBUG APK..."
            flutter build apk --debug
            APK_PATH="build/app/outputs/flutter-apk/app-debug.apk"
          fi
          
          if [ ! -f "$APK_PATH" ]; then
            echo "Error: APK not found at $APK_PATH"
            if [ -f "build/app/outputs/apk/release/app-release.apk" ]; then
              APK_PATH="build/app/outputs/apk/release/app-release.apk"
              echo "Found APK at alternative path"
            else
              echo "No APK found"
              exit 1
            fi
          fi
          
          echo "APK_PATH=$APK_PATH" >> $GITHUB_OUTPUT
          APK_SIZE=$(ls -lh "$APK_PATH" | awk '{print $5}')
          echo "APK_SIZE=$APK_SIZE" >> $GITHUB_OUTPUT
          echo "APK built successfully! Size: $APK_SIZE"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.event.inputs.build_mode }}
          path: project/${{ steps.build.outputs.APK_PATH }}
          retention-days: 7

      - name: Upload Debug Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: |
            project/build/
            project/.dart_tool/
            ~/.gradle/
          retention-days: 3

      - name: Build Summary
        run: |
          echo "=========================================="
          echo "BUILD SUMMARY"
          echo "=========================================="
          echo "Job ID: ${{ github.event.inputs.job_id }}"
          echo "Project Name: ${{ steps.project_name.outputs.PROJECT_NAME }}"
          echo "SDK Version: ${{ github.event.inputs.sdk_version }}"
          echo "Build Mode: ${{ github.event.inputs.build_mode }}"
          echo "APK Size: ${{ steps.build.outputs.APK_SIZE }}"
          echo "Status: SUCCESS"
          echo "=========================================="                  
