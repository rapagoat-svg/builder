name: Build APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP Project Flutter'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: subosito/flutter-action@v2
        with:
          channel: master
      - run: |
          curl -L -o a.zip "${{ inputs.zip_url }}"
          unzip -q a.zip
          rm a.zip
      - run: |
          cd $(find . -name "pubspec.yaml" -printf "%h\n" | head -1)
          flutter pub get
          flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: '**/build/app/outputs/flutter-apk/*.apk'                              
