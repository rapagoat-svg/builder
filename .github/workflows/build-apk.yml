name: Build APK Flutter

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL file ZIP project Flutter'
        required: true
        type: string
      sdk_version:
        description: 'Android SDK Version'
        required: true
        default: '34'
        type: string
      build_mode:
        description: 'Build Mode (release/debug)'
        required: true
        default: 'release'
        type: string
      job_id:
        description: 'Job ID untuk tracking'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'master'

      - name: Download & Extract Project
        run: |
          curl -L -o project.zip "${{ github.event.inputs.zip_url }}"
          unzip -q project.zip
          rm project.zip
          PROJ_DIR=$(find . -name "pubspec.yaml" -printf "%h\n" | head -1)
          if [ "$PROJ_DIR" != "." ] && [ -n "$PROJ_DIR" ]; then
            mv "$PROJ_DIR"/* ./ 2>/dev/null || true
            mv "$PROJ_DIR"/.[!.]* ./ 2>/dev/null || true
            rm -rf "$PROJ_DIR"
          fi
          ls -la

      - name: Fix pubspec.yaml & Tambah Dio
        run: |
          python3 << 'EOF'
          import re
          with open("pubspec.yaml", "r") as f:
              content = f.read()

          # Fix SDK
          content = re.sub(r'sdk:\s*["\']?.*?["\']?', 'sdk: ">=3.5.0 <4.0.0"', content)

          # Tambah Dio (jika belum ada)
          if "dio:" not in content:
              content = re.sub(
                  r'(^dependencies:\s*\n)',
                  r'\1  dio: ^5.7.0\n',
                  content,
                  flags=re.MULTILINE
              )

          # Hapus dependency bermasalah
          bad_deps = ["font_awesome_flutter", "icon_data", "flutter_lints", "flutter_native_splash", "flutter_launcher_icons", "pretty_dio_logger"]
          for dep in bad_deps:
              content = re.sub(rf'^[ \t]{{2,4}}{re.escape(dep)}\b[^\n]*(\n[ \t]{{4,}}[^\n]*)*\n?', '', content, flags=re.MULTILINE)

          with open("pubspec.yaml", "w") as f:
              f.write(content)
          print("pubspec.yaml fixed + Dio added")
          EOF

      - name: Fix Dart Code (Icons + FontAwesome)
        run: |
          python3 << 'EOF'
          import os, re, glob
          # ... (fa_icon_map sama seperti sebelumnya - panjang)
          # Saya ringkas, pakai map yang sudah ada di workflow kamu
          fa_icon_map = { ... }  # gunakan map lengkap dari workflow lama kamu

          for filepath in glob.glob('lib/**/*.dart', recursive=True):
              with open(filepath, 'r', encoding='utf-8') as f:
                  content = f.read()
              original = content
              content = content.replace('Icons.info_outlineCircle', 'Icons.info_outline')
              # Ganti FaIcon dll...
              for old, new in fa_icon_map.items():
                  content = content.replace(old, new)
              content = re.sub(r'FontAwesomeIcons\.\w+', 'Icons.widgets', content)
              content = re.sub(r'\bFaIcon\s*\(', 'Icon(', content)
              if content != original:
                  with open(filepath, 'w', encoding='utf-8') as f:
                      f.write(content)
          EOF

      - name: Fix connection_rotator.dart (Dio Style)
        run: |
          python3 << 'EOF'
          import os, re

          filepath = "lib/services/connection_rotator.dart"
          if os.path.exists(filepath):
              with open(filepath, 'r', encoding='utf-8') as f:
                  content = f.read()
              
              # Paksa pakai Dio atau HttpClient yang benar
              content = re.sub(r'Future<Client>', 'Future<http.Client>', content, flags=re.IGNORECASE)
              content = re.sub(r'\bIOClient\b', 'HttpClient', content)
              content = re.sub(r'return IOClient', 'return HttpClient', content)

              if "import 'dart:io';" not in content:
                  content = "import 'dart:io';\n" + content

              # Hapus import http yang konflik
              content = re.sub(r"^import\s+['\"]package:http/[^'\"]*['\"];\s*\n?", '', content, flags=re.MULTILINE)

              with open(filepath, 'w', encoding='utf-8') as f:
                  f.write(content)
              print("✅ connection_rotator.dart fixed")
          EOF

      - name: Update SDK & Clean
        run: |
          SDK_VERSION="${{ github.event.inputs.sdk_version }}"
          sed -i "s/compileSdkVersion [0-9]*/compileSdkVersion $SDK_VERSION/" android/app/build.gradle 2>/dev/null || true
          sed -i "s/targetSdkVersion [0-9]*/targetSdkVersion $SDK_VERSION/" android/app/build.gradle 2>/dev/null || true
          flutter clean
          flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk                                                        
