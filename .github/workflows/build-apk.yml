          }

          dart_files = glob.glob('lib/**/*.dart', recursive=True)
          dart_files += glob.glob('lib/*.dart')
          dart_files = list(set(dart_files))

          total_fixed = 0
          for filepath in dart_files:
              try:
                  with open(filepath, 'r', encoding='utf-8') as f:
                      content = f.read()
                  original = content
                  for bad, good in invalid_icon_map.items():
                      content = content.replace(bad, good)
                  if content != original:
                      with open(filepath, 'w', encoding='utf-8') as f:
                          f.write(content)
                      total_fixed += 1
                      print(f"Fixed icons in: {filepath}")
              except Exception as e:
                  print(f"Skip {filepath}: {e}")

          print(f"Total files with icon fixes: {total_fixed}")
          EOF
          echo "Icon fix completed"

      # ============================================================
      # FINAL FIX: Tulis connection_rotator.dart pakai base64
      # Cara ini 100% aman - tidak ada masalah escaping sama sekali
      # karena file dikirim sebagai base64 lalu di-decode
      # ============================================================
      - name: Force Overwrite connection_rotator.dart (base64)
        run: |
          mkdir -p lib/services
          echo "" | base64 -d > lib/services/connection_rotator.dart
          echo "=== VERIFY ISI FILE ==="
          cat lib/services/connection_rotator.dart
          echo "=== DONE ==="

      - name: Update Android SDK Version in build.gradle
        run: |
          SDK_VERSION="${{ github.event.inputs.sdk_version }}"
          if [ -f "android/app/build.gradle" ]; then
            sed -i "s/compileSdkVersion [0-9]*/compileSdkVersion $SDK_VERSION/" android/app/build.gradle
            sed -i "s/targetSdkVersion [0-9]*/targetSdkVersion $SDK_VERSION/" android/app/build.gradle
            sed -i "s/minSdkVersion [0-9]*/minSdkVersion 21/" android/app/build.gradle
            echo "build.gradle updated"
          fi
          if [ -f "android/app/build.gradle.kts" ]; then
            sed -i "s/compileSdk = [0-9]*/compileSdk = $SDK_VERSION/" android/app/build.gradle.kts
            sed -i "s/targetSdk = [0-9]*/targetSdk = $SDK_VERSION/" android/app/build.gradle.kts
            echo "build.gradle.kts updated"
          fi
          mkdir -p android
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "local.properties created"

      - name: Clean Flutter Project
        run: |
          flutter clean || true
          rm -rf .dart_tool .gradle build pubspec.lock 2>/dev/null || true
          echo "Clean completed"

      - name: Get Flutter Dependencies
        run: |
          flutter pub get
          if [ $? -ne 0 ]; then
            echo "Pub get failed, trying with --no-example..."
            flutter pub get --no-example
          fi
          echo "Dependencies resolved"

      - name: Auto Fix Dart Code
        run: |
          dart fix --apply || true
          echo "Dart fix completed"

      - name: Build APK
        id: build
        run: |
          if [ "${{ github.event.inputs.build_mode }}" = "release" ]; then
            echo "Building RELEASE APK..."
            flutter build apk --release --no-tree-shake-icons
            APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          else
            echo "Building DEBUG APK..."
            flutter build apk --debug --no-tree-shake-icons
            APK_PATH="build/app/outputs/flutter-apk/app-debug.apk"
          fi
          if [ ! -f "$APK_PATH" ]; then
            if [ -f "build/app/outputs/apk/release/app-release.apk" ]; then
              APK_PATH="build/app/outputs/apk/release/app-release.apk"
            elif [ -f "build/app/outputs/apk/debug/app-debug.apk" ]; then
              APK_PATH="build/app/outputs/apk/debug/app-debug.apk"
            else
              echo "ERROR: APK not found!"
              find . -name "*.apk" 2>/dev/null
              exit 1
            fi
          fi
          echo "APK_PATH=$APK_PATH" >> $GITHUB_OUTPUT
          APK_SIZE=$(ls -lh "$APK_PATH" | awk '{print $5}')
          echo "APK_SIZE=$APK_SIZE" >> $GITHUB_OUTPUT
          echo "APK built successfully! Size: $APK_SIZE"
          ls -lh "$APK_PATH"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.event.inputs.build_mode }}-sdk${{ github.event.inputs.sdk_version }}
          path: ${{ steps.build.outputs.APK_PATH }}
          retention-days: 7

      - name: Upload Debug Logs (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: |
            pubspec.yaml
            android/app/build.gradle
            lib/services/connection_rotator.dart
            build/
            .dart_tool/
          retention-days: 3

      - name: Build Summary
        run: |
          echo "=========================================="
          echo "BUILD SUMMARY"
          echo "=========================================="
          echo "Job ID: ${{ github.event.inputs.job_id }}"
          echo "Project Name: $(grep '^name:' pubspec.yaml | cut -d' ' -f2)"
          echo "SDK Version: ${{ github.event.inputs.sdk_version }}"
          echo "Build Mode: ${{ github.event.inputs.build_mode }}"
          echo "APK Size: ${{ steps.build.outputs.APK_SIZE }}"
          echo "Status: SUCCESS"
          echo "=========================================="
