name: Flutter Build Bot

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Tipe build: apk-debug | apk-release | aab-release'
        required: false
        default: 'apk-release'
        type: choice
        options:
          - apk-debug
          - apk-release
          - aab-release
      flutter_version:
        description: 'Flutter version override (kosongkan untuk default)'
        required: false
        default: ''
        type: string
      release_tag:
        description: 'Release tag dari bot Telegram'
        required: false
        default: ''
        type: string

  push:
    branches:
      - main
    paths:
      - 'lib/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'android/**'
      - 'assets/**'

jobs:
  build:
    name: Build Flutter App
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ============================================
      # ⬇️ DOWNLOAD ZIP DARI RELEASE BOT
      # ============================================
      - name: 📥 Download Project ZIP from Bot Release
        if: github.event.inputs.release_tag != ''
        run: |
          echo "📥 Mendownload project dari release: ${{ github.event.inputs.release_tag }}"
          
          # TUNGGU dulu 15 detik untuk memastikan release sudah siap
          echo "⏳ Menunggu 15 detik untuk memastikan release siap..."
          sleep 15
          
          # Get release info dengan RETRY
          MAX_RETRY=5
          RETRY=0
          ASSET_URL=""
          
          while [ $RETRY -lt $MAX_RETRY ]; do
            echo "🔍 Attempt $((RETRY+1))/$MAX_RETRY: Mencari release..."
            
            RELEASE_RESPONSE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.event.inputs.release_tag }}")
            
            RELEASE_ID=$(echo "$RELEASE_RESPONSE" | jq -r '.id')
            
            if [ "$RELEASE_ID" != "null" ] && [ -n "$RELEASE_ID" ]; then
              echo "✅ Release ditemukan! ID: $RELEASE_ID"
              
              ASSET_URL=$(echo "$RELEASE_RESPONSE" | jq -r '.assets[0].browser_download_url')
              
              if [ "$ASSET_URL" != "null" ] && [ -n "$ASSET_URL" ]; then
                echo "✅ Asset ditemukan: $ASSET_URL"
                break
              else
                echo "⚠️ Release ada tapi asset belum siap, tunggu 10 detik..."
                sleep 10
              fi
            else
              echo "⚠️ Release belum ditemukan, tunggu 10 detik..."
              sleep 10
            fi
            
            RETRY=$((RETRY+1))
          done
          
          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "❌ Gagal mendapatkan asset setelah $MAX_RETRY kali percobaan!"
            echo "Release response:"
            echo "$RELEASE_RESPONSE" | jq '.'
            
            echo ""
            echo "📋 Daftar release yang ada:"
            curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases?per_page=5" | \
              jq '.[].tag_name'
            
            exit 1
          fi
          
          echo "📦 Download dari: $ASSET_URL"
          curl -L -o project.zip "$ASSET_URL"
          
          if [ ! -f project.zip ]; then
            echo "❌ File ZIP gagal didownload!"
            exit 1
          fi
          
          echo "📏 Size: $(du -h project.zip | cut -f1)"
          
          echo "📂 Mengekstrak ZIP..."
          mkdir -p project_extracted
          unzip -o project.zip -d project_extracted/
          
          if [ -f "project_extracted/pubspec.yaml" ]; then
            echo "✅ pubspec.yaml ditemukan di root ZIP"
            cp -rf project_extracted/* .
            cp -rf project_extracted/.* . 2>/dev/null || true
          else
            echo "🔍 Mencari pubspec.yaml di subfolder..."
            SUBFOLDER=$(find project_extracted -name "pubspec.yaml" -not -path "*/.*" | head -1)
            
            if [ -n "$SUBFOLDER" ]; then
              PROJECT_DIR=$(dirname "$SUBFOLDER")
              echo "✅ pubspec.yaml ditemukan di: $PROJECT_DIR"
              cp -rf "$PROJECT_DIR"/* .
              cp -rf "$PROJECT_DIR"/.* . 2>/dev/null || true
            else
              echo "❌ pubspec.yaml TIDAK DITEMUKAN!"
              echo "Isi ZIP:"
              ls -laR project_extracted/ | head -50
              exit 1
            fi
          fi
          
          rm -rf project_extracted project.zip
          
          echo "✅ Project siap:"
          echo "---"
          ls -la
          echo "---"
          head -20 pubspec.yaml

      # ============================================
      # 🔧 PERBAIKAN ERROR OTAX
      # ============================================
      - name: 🔧 Fix Otax Package Error
        run: |
          echo "=========================================="
          echo "=== FIX OTAX PACKAGE ERROR ==="
          echo "=========================================="
          
          # 1. Cek apakah package otax ada di pubspec.yaml
          if [ -f pubspec.yaml ]; then
            echo "📋 Memeriksa pubspec.yaml..."
            
            if grep -q "otax" pubspec.yaml; then
              echo "⚠️ Package 'otax' ditemukan di pubspec.yaml"
              
              # Cek apakah otax adalah path dependency atau git
              if grep -A2 "otax:" pubspec.yaml | grep -q "path:"; then
                OTAX_PATH=$(grep -A2 "otax:" pubspec.yaml | grep "path:" | sed 's/.*path:\s*//' | tr -d '\r')
                echo "📍 otax adalah path dependency: $OTAX_PATH"
                
                if [ ! -d "$OTAX_PATH" ]; then
                  echo "❌ Folder otax tidak ditemukan di $OTAX_PATH"
                  echo "🔧 Menghapus dependency otax dari pubspec.yaml..."
                  
                  # Hapus baris otax dari pubspec.yaml
                  sed -i '/otax:/,/^$\|^[a-z]/{
                    /otax:/d
                    /path:/d
                    /git:/d
                    /url:/d
                    /ref:/d
                    /^$/d
                  }' pubspec.yaml
                  
                  echo "✅ Dependency otax dihapus dari pubspec.yaml"
                else
                  echo "✅ Folder otax ditemukan"
                fi
              elif grep -A2 "otax:" pubspec.yaml | grep -q "git:"; then
                echo "📍 otax adalah git dependency, mencoba clone..."
                
                GIT_URL=$(grep -A3 "otax:" pubspec.yaml | grep "url:" | sed 's/.*url:\s*//' | tr -d '\r')
                echo "🔗 Git URL: $GIT_URL"
                
                if [ -n "$GIT_URL" ]; then
                  git clone "$GIT_URL" otax_package || echo "⚠️ Gagal clone otax"
                  if [ -d otax_package ]; then
                    sed -i "s|git:|path: otax_package|g" pubspec.yaml
                    sed -i "/url:/d" pubspec.yaml
                    sed -i "/ref:/d" pubspec.yaml
                    echo "✅ otax berhasil di-clone"
                  fi
                fi
              else
                echo "📍 otax adalah pub.dev dependency"
                echo "⚠️ Jika otax tidak ada di pub.dev, build akan gagal"
              fi
            else
              echo "✅ Package 'otax' tidak ada di pubspec.yaml"
            fi
          fi
          
          # 2. Cari dan HAPUS import otax di file Dart
          echo ""
          echo "🔍 Mencari import 'package:otax/' di file Dart..."
          
          OTAX_IMPORTS=$(grep -rn "import 'package:otax/" lib/ 2>/dev/null || true)
          
          if [ -n "$OTAX_IMPORTS" ]; then
            echo "⚠️ Ditemukan import otax:"
            echo "$OTAX_IMPORTS"
            echo ""
            
            # Hapus semua import otax
            echo "🗑️ Menghapus import otax..."
            find lib/ -name "*.dart" -type f | while read file; do
              if grep -q "package:otax/" "$file"; then
                echo "  Fixing: $file"
                sed -i "/import 'package:otax\//d" "$file"
              fi
            done
            echo "✅ Import otax dihapus"
          else
            echo "✅ Tidak ada import otax ditemukan"
          fi
          
          # 3. Cari dan GANTI class/method dari otax
          echo ""
          echo "🔍 Mencari penggunaan class/method dari otax..."
          
          # Daftar class/method yang umum dari otax yang perlu diganti
          declare -A OTAX_REPLACEMENTS=(
            ["AnimeStream"]="SizedBox"
            ["AppProvider"]="ChangeNotifier"
            ["ensureAnimeStreamInitialized"]="Future.delayed"
            ["PacmanScreen"]="SizedBox"
            ["AnimePage"]="Scaffold"
          )
          
          for file in $(find lib/ -name "*.dart" -type f 2>/dev/null); do
            MODIFIED=false
            
            for old_class in "${!OTAX_REPLACEMENTS[@]}"; do
              if grep -q "$old_class" "$file" 2>/dev/null; then
                echo "  Found '$old_class' in: $file"
                
                case "$old_class" in
                  "AnimeStream")
                    # Ganti AnimeStream() dengan placeholder
                    sed -i "s/const AnimeStream()/const SizedBox()/g" "$file"
                    sed -i "s/AnimeStream()/SizedBox()/g" "$file"
                    ;;
                  "AppProvider")
                    # Ganti AppProvider() dengan ChangeNotifier placeholder
                    sed -i "s/AppProvider()/ChangeNotifier()/g" "$file"
                    sed -i "s/create: (ctx) => AppProvider()/create: (ctx) => ChangeNotifier()/g" "$file"
                    ;;
                  "ensureAnimeStreamInitialized")
                    # Ganti dengan Future.value
                    sed -i "s/ensureAnimeStreamInitialized()/Future.delayed(Duration.zero)/g" "$file"
                    sed -i "s/future: ensureAnimeStreamInitialized()/future: Future.delayed(Duration.zero)/g" "$file"
                    ;;
                  "PacmanScreen")
                    # Ganti PacmanScreen() dengan placeholder
                    sed -i "s/const PacmanScreen()/const SizedBox()/g" "$file"
                    sed -i "s/PacmanScreen()/SizedBox()/g" "$file"
                    ;;
                  "AnimePage")
                    # Ganti AnimePage dengan Scaffold kosong
                    sed -i "s/AnimePage()/Scaffold(body: Center(child: Text('Coming Soon')))/g" "$file"
                    ;;
                esac
                
                MODIFIED=true
              fi
            done
            
            if [ "$MODIFIED" = true ]; then
              echo "  ✅ Fixed: $file"
            fi
          done
          
          # 4. Hapus package:otax dari .dart_tool jika ada
          if [ -d ".dart_tool" ]; then
            find .dart_tool -name "package_config.json" -type f | while read f; do
              if grep -q "otax" "$f" 2>/dev/null; then
                echo "🗑️ Menghapus referensi otax dari $f"
                sed -i '/otax/d' "$f"
              fi
            done
          fi
          
          echo ""
          echo "=== VERIFIKASI AKHIR ==="
          echo "Import otax tersisa:"
          grep -rn "package:otax/" lib/ 2>/dev/null || echo "✅ TIDAK ADA (BERSIH!)"
          echo ""
          echo "Penggunaan class otax:"
          for class in AnimeStream AppProvider ensureAnimeStreamInitialized PacmanScreen AnimePage; do
            COUNT=$(grep -rn "$class" lib/ 2>/dev/null | wc -l)
            if [ "$COUNT" -gt 0 ]; then
              echo "⚠️ $class: $COUNT penggunaan tersisa"
            else
              echo "✅ $class: BERSIH"
            fi
          done
          
          echo ""
          echo "✅ Fix Otax Package Error SELESAI!"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          channel: 'stable'
          cache: true

      # ========== SETUP APP ICON ==========
      - name: 🎨 Setup App Icon dari assets/icon/icon.jpg
        run: |
          echo "=========================================="
          echo "=== SETUP APP ICON ==="
          echo "=========================================="
          
          ICON_SOURCE="assets/icon/icon.jpg"
          if [ ! -f "$ICON_SOURCE" ]; then
            echo "⚠️ $ICON_SOURCE tidak ditemukan, mencari icon di tempat lain..."
            
            for possible_icon in assets/icon/icon.png assets/icon.png icon.jpg icon.png; do
              if [ -f "$possible_icon" ]; then
                ICON_SOURCE="$possible_icon"
                echo "✅ Icon ditemukan: $ICON_SOURCE"
                break
              fi
            done
          fi
          
          if [ ! -f "$ICON_SOURCE" ]; then
            echo "⚠️ Tidak ada icon ditemukan, membuat icon default..."
            
            mkdir -p assets/icon
            
            if command -v convert >/dev/null 2>&1; then
              convert -size 1024x1024 gradient:blue-cyan \
                -fill white -font Helvetica -pointsize 200 \
                -gravity center -annotate 0 "X" \
                assets/icon/icon.jpg
              echo "✅ Icon default dibuat dengan ImageMagick"
            else
              echo "📦 Menginstall ImageMagick..."
              sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick
              
              convert -size 1024x1024 gradient:blue-cyan \
                -fill white -font Helvetica -pointsize 200 \
                -gravity center -annotate 0 "X" \
                assets/icon/icon.jpg
              echo "✅ Icon default dibuat"
            fi
            ICON_SOURCE="assets/icon/icon.jpg"
          fi
          
          echo "📱 Icon source: $ICON_SOURCE"
          echo "📏 Icon size: $(du -h "$ICON_SOURCE" | cut -f1)"
          
          echo ""
          echo "=== Generating Android Icons ==="
          
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p "android/app/src/main/res/mipmap-$density"
          done
          
          declare -A ICON_SIZES
          ICON_SIZES[mdpi]=48
          ICON_SIZES[hdpi]=72
          ICON_SIZES[xhdpi]=96
          ICON_SIZES[xxhdpi]=144
          ICON_SIZES[xxxhdpi]=192
          
          declare -A ADAPTIVE_SIZES
          ADAPTIVE_SIZES[mdpi]=108
          ADAPTIVE_SIZES[hdpi]=162
          ADAPTIVE_SIZES[xhdpi]=216
          ADAPTIVE_SIZES[xxhdpi]=324
          ADAPTIVE_SIZES[xxxhdpi]=432
          
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            size=${ICON_SIZES[$density]}
            adaptive_size=${ADAPTIVE_SIZES[$density]}
            
            convert "$ICON_SOURCE" -resize "${size}x${size}" \
              "android/app/src/main/res/mipmap-${density}/ic_launcher.png"
            
            convert "$ICON_SOURCE" -resize "${adaptive_size}x${adaptive_size}" \
              -gravity center -background none -extent "${adaptive_size}x${adaptive_size}" \
              "android/app/src/main/res/mipmap-${density}/ic_launcher_foreground.png"
            
            convert -size "${adaptive_size}x${adaptive_size}" xc:white \
              "android/app/src/main/res/mipmap-${density}/ic_launcher_background.png"
            
            echo "✅ Generated icons for $density (${size}x${size})"
          done
          
          ADAPTIVE_ICON_DIR="android/app/src/main/res/mipmap-anydpi-v26"
          mkdir -p "$ADAPTIVE_ICON_DIR"
          
          cat > "$ADAPTIVE_ICON_DIR/ic_launcher.xml" << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@mipmap/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          XMLEOF
          echo "✅ Adaptive icon XML dibuat"
          
          cat > "$ADAPTIVE_ICON_DIR/ic_launcher_round.xml" << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@mipmap/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          XMLEOF
          echo "✅ Round icon XML dibuat"
          
          echo ""
          echo "=== Icon Verification ==="
          ls -lh android/app/src/main/res/mipmap-mdpi/
          echo "---"
          cat "$ADAPTIVE_ICON_DIR/ic_launcher.xml"
          
          echo ""
          echo "✅ App Icon setup complete!"

      # ========== FIX PUBSPEC.YAML ASSETS ==========
      - name: 📋 Fix pubspec.yaml Asset References
        run: |
          echo "=========================================="
          echo "=== FIX PUBSPEC.YAML ASSETS ==="
          echo "=========================================="
          
          if [ ! -f pubspec.yaml ]; then
            echo "❌ pubspec.yaml tidak ditemukan!"
            exit 1
          fi
          
          cp pubspec.yaml pubspec.yaml.bak
          
          if ! grep -q "assets:" pubspec.yaml; then
            echo "➕ Menambahkan assets section ke pubspec.yaml"
            cat >> pubspec.yaml << 'EOF'

          flutter:
            assets:
              - assets/icon/icon.jpg
              - assets/icon/
              - assets/images/
              - assets/
          EOF
          else
            if ! grep -q "assets/icon/icon.jpg" pubspec.yaml; then
              echo "➕ Menambahkan assets/icon/icon.jpg ke pubspec.yaml"
              
              sed -i '/^flutter:/,/^[a-z]/{
                /assets:/a\    - assets/icon/icon.jpg
                /assets:/a\    - assets/icon/
              }' pubspec.yaml
            fi
            
            if ! grep -q "\- assets/" pubspec.yaml; then
              echo "➕ Menambahkan folder assets/"
              sed -i '/^flutter:/,/^[a-z]/{
                /assets:/a\    - assets/
              }' pubspec.yaml
            fi
          fi
          
          echo "--- pubspec.yaml (flutter section) ---"
          sed -n '/^flutter:/,/^[a-z]/p' pubspec.yaml | head -20
          
          echo ""
          echo "✅ pubspec.yaml fixed"

      # ========== CREATE ASSETS STRUCTURE ==========
      - name: 📁 Create Required Assets Structure
        run: |
          echo "=========================================="
          echo "=== CREATE ASSETS STRUCTURE ==="
          echo "=========================================="
          
          mkdir -p assets/icon
          mkdir -p assets/images
          mkdir -p assets/videos
          mkdir -p assets/audio
          mkdir -p assets/fonts
          mkdir -p assets/icons
          mkdir -p assets/animations
          
          for dir in assets/*/; do
            if [ -z "$(ls -A "$dir" 2>/dev/null)" ]; then
              touch "$dir.gitkeep"
            fi
          done
          
          if [ ! -f "assets/icon/icon.jpg" ]; then
            echo "⚠️ assets/icon/icon.jpg belum ada"
            
            if [ -f "icon.jpg" ]; then
              cp icon.jpg assets/icon/icon.jpg
              echo "✅ icon.jpg dipindahkan ke assets/icon/"
            elif [ -f "assets/icon.jpg" ]; then
              cp assets/icon.jpg assets/icon/icon.jpg
              echo "✅ icon.jpg disalin dari assets/"
            fi
          fi
          
          echo ""
          echo "=== Assets Structure ==="
          find assets -type f -o -type d | sort
          
          echo ""
          echo "✅ Assets structure created"

      # ========== FIX JAVA & NAMESPACE ==========
      - name: Fix Java and Namespace
        run: |
          FILE_PATH="android/app/src/main/java/com/nullx/pp/SpyService.java"
          if [ -f "$FILE_PATH" ]; then
            sed -i '/import com.nullx.pp.R;/d' "$FILE_PATH"
            echo "✅ Import R dihapus"
          fi
          
          BUILD_GRADLE="android/app/build.gradle"
          if [ -f "$BUILD_GRADLE" ]; then
            if ! grep -q "namespace 'com.nullx.pp'" "$BUILD_GRADLE"; then
              sed -i "/android {/a \    namespace 'com.nullx.pp'" "$BUILD_GRADLE"
              echo "✅ Namespace dipaksa ke com.nullx.pp"
            fi
          fi

      - name: Fix Kotlin Version Compatibility
        run: |
          BUILD_GRADLE="android/build.gradle"
          if [ -f "$BUILD_GRADLE" ]; then
            if grep -q "kotlin_version" "$BUILD_GRADLE"; then
              sed -i "s/ext\.kotlin_version = '[^']*'/ext.kotlin_version = '1.9.10'/" "$BUILD_GRADLE"
              echo "kotlin_version patched ke 1.9.10"
            else
              sed -i "/buildscript {/a\\    ext.kotlin_version = '1.9.10'" "$BUILD_GRADLE"
              echo "kotlin_version ditambahkan"
            fi
          fi
          echo "--- android/build.gradle ---"
          cat "$BUILD_GRADLE" 2>/dev/null || echo "(not found)"

      - name: 🔧 Fix minSdkVersion & AndroidManifest
        run: |
          echo "=== Fixing all gradle files ==="
          
          find android -name "build.gradle" -o -name "build.gradle.kts" | while read f; do
            echo "Processing: $f"
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/g' "$f"
            sed -i 's/minSdkVersion 21/minSdkVersion 23/g' "$f"
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 23/g' "$f"
            sed -i 's/minSdk(flutter.minSdkVersion)/minSdk(23)/g' "$f"
            sed -i 's/minSdk = 21/minSdk = 23/g' "$f"
            sed -i 's/minSdk 21/minSdk 23/g' "$f"
          done
          
          echo "=== All gradle files fixed ==="
          grep -r "minSdk" android/ 2>/dev/null | head -10
          
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            echo "=== Fixing AndroidManifest ==="
            
            if ! grep -q "xmlns:tools" "$MANIFEST"; then
              sed -i 's/<manifest/<manifest xmlns:tools="http:\/\/schemas.android.com\/tools"/' "$MANIFEST"
              echo "✅ xmlns:tools added"
            fi
            
            if ! grep -q "overrideLibrary" "$MANIFEST"; then
              sed -i 's/<application/<application\n        tools:overrideLibrary="com.llfbandit.record"/' "$MANIFEST"
              echo "✅ overrideLibrary added"
            fi
            
            echo "--- AndroidManifest.xml ---"
            head -12 "$MANIFEST"
          fi

      - name: 🔧 Fix compileSdk, Assets & Java
        run: |
          echo "=========================================="
          echo "=== FIX 1: compileSdk ke 36 ==="
          echo "=========================================="
          
          find android -type f \( -name "build.gradle" -o -name "build.gradle.kts" \) | while read f; do
            echo "=== Before: $f ==="
            grep -n "compileSdk" "$f" || echo "(no compileSdk found)"
            
            sed -i 's/compileSdkVersion\s*=\?\s*35/compileSdkVersion 36/g' "$f"
            sed -i 's/compileSdkVersion\s*=\?\s*34/compileSdkVersion 36/g' "$f"
            sed -i 's/compileSdkVersion\s*=\?\s*33/compileSdkVersion 36/g' "$f"
            sed -i 's/compileSdk\s*=\?\s*35/compileSdk = 36/g' "$f"
            sed -i 's/compileSdk\s*=\?\s*34/compileSdk = 36/g' "$f"
            sed -i 's/compileSdk\s*=\?\s*33/compileSdk = 36/g' "$f"
            sed -i 's/compileSdk(35)/compileSdk(36)/g' "$f"
            sed -i 's/compileSdk(34)/compileSdk(36)/g' "$f"
            sed -i 's/compileSdk(33)/compileSdk(36)/g' "$f"
            sed -i 's/compileSdk\s\+35/compileSdk 36/g' "$f"
            sed -i 's/compileSdk\s\+34/compileSdk 36/g' "$f"
            
            echo "=== After: $f ==="
            grep -n "compileSdk" "$f" || echo "(no compileSdk)"
          done
          
          if [ -f android/build.gradle ]; then
            sed -i 's/compileSdkVersion\s*=\?\s*35/compileSdkVersion 36/g' android/build.gradle
            sed -i 's/compileSdk\s*=\?\s*35/compileSdk = 36/g' android/build.gradle
          fi

          echo ""
          echo "=========================================="
          echo "=== FIX 2: Buat folder assets ==="
          echo "=========================================="
          
          for dir in assets assets/images assets/videos assets/audio assets/fonts assets/icons assets/icon assets/animations; do
            if [ ! -d "$dir" ]; then
              mkdir -p "$dir"
              touch "$dir/.gitkeep"
              echo "✅ Created: $dir/"
            else
              echo "✅ Exists: $dir/"
            fi
          done
          
          if [ -f pubspec.yaml ]; then
            echo "Reading pubspec.yaml for assets..."
            grep -E "^\s+-\s+" pubspec.yaml | sed 's/.*- //' | while read asset; do
              if echo "$asset" | grep -q "/$"; then
                if [ ! -d "$asset" ]; then
                  mkdir -p "$asset"
                  touch "$asset/.gitkeep"
                  echo "✅ Created from pubspec: $asset"
                fi
              else
                PARENT_DIR=$(dirname "$asset")
                if [ "$PARENT_DIR" != "." ] && [ ! -d "$PARENT_DIR" ]; then
                  mkdir -p "$PARENT_DIR"
                  touch "$PARENT_DIR/.gitkeep"
                  echo "✅ Created parent: $PARENT_DIR/"
                fi
                if [ ! -f "$asset" ]; then
                  touch "$asset"
                  echo "✅ Created placeholder: $asset"
                fi
              fi
            done
          fi

          echo ""
          echo "=========================================="
          echo "=== FIX 3: Java InputType ==="
          echo "=========================================="
          
          JAVA_FILE="android/app/src/main/java/com/nullx/pp/LockOverlayService.java"
          if [ -f "$JAVA_FILE" ]; then
            echo "Fixing: $JAVA_FILE"
            cp "$JAVA_FILE" "$JAVA_FILE.bak"
            
            sed -i 's/InputType\.TYPE_NUMBER_PASSWORD/(InputType.TYPE_CLASS_NUMBER | InputType.TYPE_NUMBER_VARIATION_PASSWORD)/g' "$JAVA_FILE"
            
            if grep -q "TYPE_NUMBER_PASSWORD" "$JAVA_FILE"; then
              echo "❌ Fix failed, masih ada TYPE_NUMBER_PASSWORD"
              if ! grep -q "import android.text.InputType" "$JAVA_FILE"; then
                sed -i '1s/^/import android.text.InputType;\n/' "$JAVA_FILE"
              fi
              sed -i 's/InputType\.TYPE_NUMBER_PASSWORD/129/g' "$JAVA_FILE"
              echo "✅ Fixed with numeric value 129"
            else
              echo "✅ TYPE_NUMBER_PASSWORD fixed"
            fi
          else
            echo "⚠️ LockOverlayService.java not found, searching..."
            find android -name "*.java" -type f | while read f; do
              if grep -l "TYPE_NUMBER_PASSWORD" "$f" 2>/dev/null; then
                echo "Found in: $f"
                sed -i 's/InputType\.TYPE_NUMBER_PASSWORD/(InputType.TYPE_CLASS_NUMBER | InputType.TYPE_NUMBER_VARIATION_PASSWORD)/g' "$f"
                echo "✅ Fixed: $f"
              fi
            done
          fi

          echo ""
          echo "=========================================="
          echo "=== ALL FIXES COMPLETE ==="
          echo "=========================================="
          
          echo ""
          echo "=== Verification ==="
          echo "compileSdk values:"
          grep -rn "compileSdk" android/ 2>/dev/null | grep -v ".bak" | head -10
          echo ""
          echo "Asset directories:"
          ls -d assets/*/ 2>/dev/null || echo "(no asset dirs)"
          echo ""
          echo "TYPE_NUMBER_PASSWORD occurrences:"
          grep -rn "TYPE_NUMBER_PASSWORD" android/ 2>/dev/null || echo "✅ None found (FIXED!)"

      - name: Set Build Type
        id: build_info
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          if [ -z "$BUILD_TYPE" ]; then
            BUILD_TYPE="apk-debug"
          fi
          echo "build_type=$BUILD_TYPE" >> $GITHUB_OUTPUT
          echo "Build type: $BUILD_TYPE"

      - name: Fix Duplicate Icon Resources
        run: |
          NEED_CONVERT=0
          for dir in android/app/src/main/res/mipmap-*; do
            [ -d "$dir" ] || continue
            for base in ic_launcher ic_launcher_round ic_launcher_foreground; do
              jpg="$dir/$base.jpg"
              [ -f "$jpg" ] || continue
              if [ ! -f "$dir/$base.png" ] && [ ! -f "$dir/$base.webp" ]; then
                NEED_CONVERT=1
              fi
            done
          done

          if [ "$NEED_CONVERT" = "1" ] && ! command -v convert >/dev/null 2>&1; then
            echo "📦 Installing ImageMagick..."
            sudo apt-get update -y && sudo apt-get install -y imagemagick
          fi

          for dir in android/app/src/main/res/mipmap-*; do
            [ -d "$dir" ] || continue
            for base in ic_launcher ic_launcher_round ic_launcher_foreground; do
              jpg="$dir/$base.jpg"
              [ -f "$jpg" ] || continue

              if [ -f "$dir/$base.png" ] || [ -f "$dir/$base.webp" ]; then
                echo "🗑️ Hapus duplikat: $jpg"
                rm -f "$jpg"
              else
                echo "🔄 Convert $jpg -> $base.png"
                convert "$jpg" "$dir/$base.png"
                if [ -f "$dir/$base.png" ]; then
                  rm -f "$jpg"
                else
                  echo "⚠️ Convert gagal"
                fi
              fi
            done
          done
          echo "✅ Icon resources checked & fixed"
          ls android/app/src/main/res/mipmap-mdpi/ 2>/dev/null || true

      - name: Flutter Pub Get
        run: |
          flutter config --no-analytics
          dart --disable-analytics
          
          echo "📦 Running flutter pub get..."
          if ! flutter pub get 2>&1 | tee pub_get.log; then
            echo "⚠️ Flutter pub get gagal, mencoba perbaikan..."
            
            if grep -q "Because .* depends on" pub_get.log; then
              echo "🔧 Mencoba resolve dependency conflict..."
              flutter pub upgrade
            fi
            
            flutter pub get
          fi
          
          echo "✅ Flutter pub get selesai"

      - name: Build APK Debug
        if: steps.build_info.outputs.build_type == 'apk-debug'
        run: |
          flutter build apk --debug \
            --no-shrink \
            --target-platform android-arm,android-arm64,android-x64
          echo "APK Debug selesai"

      - name: Build APK Release
        if: steps.build_info.outputs.build_type == 'apk-release'
        run: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --target-platform android-arm,android-arm64,android-x64
          echo "APK Release selesai"

      - name: Build AAB Release
        if: steps.build_info.outputs.build_type == 'aab-release'
        run: |
          flutter build appbundle --release \
            --obfuscate \
            --split-debug-info=build/debug-info
          echo "AAB Release selesai"

      - name: Prepare Output Files
        run: |
          mkdir -p output
          BUILD_TYPE="${{ steps.build_info.outputs.build_type }}"
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          APP_NAME=$(grep '^name:' pubspec.yaml | awk '{print $2}' | tr -d '\r')

          if [ "$BUILD_TYPE" = "apk-debug" ]; then
            APK_PATH=$(find build/app/outputs/flutter-apk -name "*.apk" | head -1)
            cp "$APK_PATH" "output/${APP_NAME}_debug_${TIMESTAMP}.apk"
            echo "✅ APK Debug: ${APP_NAME}_debug_${TIMESTAMP}.apk"
          elif [ "$BUILD_TYPE" = "apk-release" ]; then
            APK_PATH=$(find build/app/outputs/flutter-apk -name "app-release.apk" | head -1)
            cp "$APK_PATH" "output/${APP_NAME}_release_${TIMESTAMP}.apk"
            echo "✅ APK Release: ${APP_NAME}_release_${TIMESTAMP}.apk"
          elif [ "$BUILD_TYPE" = "aab-release" ]; then
            AAB_PATH=$(find build/app/outputs/bundle/release -name "*.aab" | head -1)
            cp "$AAB_PATH" "output/${APP_NAME}_release_${TIMESTAMP}.aab"
            echo "✅ AAB Release: ${APP_NAME}_release_${TIMESTAMP}.aab"
          fi
          
          if [ -f "assets/icon/icon.jpg" ]; then
            cp assets/icon/icon.jpg output/app_icon.jpg
            echo "✅ App icon disalin ke output"
          fi

          echo ""
          echo "📦 Output files:"
          ls -lh output/

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-build-${{ steps.build_info.outputs.build_type }}-${{ github.run_number }}
          path: output/
          retention-days: 3
          if-no-files-found: error

      - name: Build Summary
        if: always()
        run: |
          echo "## 📱 Flutter Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Build Type | ${{ steps.build_info.outputs.build_type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Flutter Version | ${{ github.event.inputs.flutter_version != '' && github.event.inputs.flutter_version || '3.32.8 (default)' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run Number | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered By | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Icon Source | assets/icon/icon.jpg |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📱 App Icon Preview" >> $GITHUB_STEP_SUMMARY
          echo "App icon diambil dari \`assets/icon/icon.jpg\` dan otomatis di-generate untuk semua density Android." >> $GITHUB_STEP_SUMMARY
