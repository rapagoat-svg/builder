name: Build APK (No Flutter Install)

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL file ZIP project Flutter'
        required: true
        type: string
      sdk_version:
        description: 'Android SDK Version'
        required: true
        default: '34'
        type: string
      build_mode:
        description: 'Build Mode'
        required: true
        default: 'release'
        type: string
      job_id:
        description: 'Job ID'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    container:
      image: cirrusci/flutter:3.22.0
      
    steps:
      - name: Download ZIP
        run: |
          curl -L -o project.zip "${{ github.event.inputs.zip_url }}"
          mkdir -p project
          unzip -q project.zip -d project/
      
      - name: Find Flutter Project
        id: finder
        run: |
          cd project
          PROJECT_DIR=$(find . -name "pubspec.yaml" -printf "%h\n" | head -1)
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_OUTPUT
          echo "Found: $PROJECT_DIR"
      
      - name: Setup SDK Version
        run: |
          cd project/${{ steps.finder.outputs.PROJECT_DIR }}
          sed -i "s/compileSdkVersion [0-9]*/compileSdkVersion ${{ github.event.inputs.sdk_version }}/" android/app/build.gradle
          sed -i "s/targetSdkVersion [0-9]*/targetSdkVersion ${{ github.event.inputs.sdk_version }}/" android/app/build.gradle
      
      - name: Flutter Pub Get
        run: |
          cd project/${{ steps.finder.outputs.PROJECT_DIR }}
          flutter pub get
      
      - name: Build APK
        run: |
          cd project/${{ steps.finder.outputs.PROJECT_DIR }}
          if [ "${{ github.event.inputs.build_mode }}" = "release" ]; then
            flutter build apk --release
          else
            flutter build apk --debug
          fi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.event.inputs.build_mode }}
          path: project/${{ steps.finder.outputs.PROJECT_DIR }}/build/app/outputs/flutter-apk/*.apk
