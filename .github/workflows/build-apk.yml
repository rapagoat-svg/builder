name: Build APK Flutter

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL file ZIP project Flutter'
        required: true
        type: string
      sdk_version:
        description: 'Android SDK Version'
        required: true
        default: '34'
        type: string
      build_mode:
        description: 'Build Mode (release/debug)'
        required: true
        default: 'release'
        type: string
      job_id:
        description: 'Job ID untuk tracking'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter SDK (Dart 3.8.1)
        uses: subosito/flutter-action@v2
        with:
          channel: 'master'

      - name: Download Project ZIP
        run: |
          echo "Downloading from: ${{ github.event.inputs.zip_url }}"
          curl -L -o project.zip "${{ github.event.inputs.zip_url }}"
          if [ ! -f project.zip ]; then
            echo "Error: Failed to download ZIP file"
            exit 1
          fi
          unzip -q project.zip
          rm project.zip
          echo "Extracted successfully"

      - name: Find and Move Flutter Project to Root
        id: finder
        run: |
          PROJ_DIR=$(find . -name "pubspec.yaml" -printf "%h\n" | head -1)
          if [ -z "$PROJ_DIR" ]; then
            echo "Error: pubspec.yaml not found!"
            exit 1
          fi
          PROJ_DIR="${PROJ_DIR#./}"
          echo "Found project at: $PROJ_DIR"
          if [ "$PROJ_DIR" != "." ] && [ -n "$PROJ_DIR" ]; then
            echo "Moving contents to root..."
            mv "$PROJ_DIR"/* ./ 2>/dev/null || true
            mv "$PROJ_DIR"/.[!.]* ./ 2>/dev/null || true
            rm -rf "$PROJ_DIR"
          fi
          echo "Project moved to root successfully"
          ls -la

      - name: Fix pubspec.yaml - SDK and Dependencies
        run: |
          echo "===== ORIGINAL pubspec.yaml ====="
          cat pubspec.yaml

          python3 << 'EOF'
          import re

          with open("pubspec.yaml", "r") as f:
              content = f.read()

          lines = content.split('\n')
          in_environment = False
          new_lines = []
          for line in lines:
              if re.match(r'^environment\s*:', line):
                  in_environment = True
                  new_lines.append(line)
                  continue
              if in_environment and line and not line[0].isspace():
                  in_environment = False
              if in_environment and re.match(r'^\s+sdk\s*:', line):
                  indent = len(line) - len(line.lstrip())
                  new_lines.append(' ' * indent + 'sdk: ">=3.5.0 <4.0.0"')
              else:
                  new_lines.append(line)
          content = '\n'.join(new_lines)

          bad_deps = [
              "font_awesome_flutter", "icon_data", "flutter_lints",
              "flutter_native_splash", "flutter_launcher_icons",
              "pretty_dio_logger", "dio",
          ]
          for dep in bad_deps:
              content = re.sub(
                  rf'^[ \t]{{2,4}}{re.escape(dep)}\b[^\n]*(\n[ \t]{{4,}}[^\n]*)*\n?',
                  '',
                  content,
                  flags=re.MULTILINE
              )

          content = re.sub(r'\n{3,}', '\n\n', content)

          if "  http:" not in content:
              content = re.sub(
                  r'(^dependencies:\s*\n)',
                  r'\1  http: ^1.2.0\n',
                  content,
                  flags=re.MULTILINE
              )

          if "cupertino_icons" not in content:
              content = re.sub(
                  r'(^dependencies:\s*\n)',
                  r'\1  cupertino_icons: ^1.0.6\n',
                  content,
                  flags=re.MULTILINE
              )

          with open("pubspec.yaml", "w") as f:
              f.write(content)

          print("pubspec.yaml berhasil diperbaiki")
          EOF

          echo "===== FIXED pubspec.yaml ====="
          cat pubspec.yaml

