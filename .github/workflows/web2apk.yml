name: Web to APK Builder

# ============================================
# TRIGGER: Manual via workflow_dispatch
# ============================================
on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'URL Website'
        required: true
        type: string
      app_name:
        description: 'Nama Aplikasi'
        required: true
        type: string
      icon_url:
        description: 'URL Icon (PNG/JPG)'
        required: true
        type: string
      timestamp:
        description: 'Timestamp'
        required: false
        type: string

# ============================================
# ENVIRONMENT VARIABLES
# ============================================
env:
  APP_NAME: ${{ github.event.inputs.app_name }}
  WEB_URL: ${{ github.event.inputs.web_url }}
  ICON_URL: ${{ github.event.inputs.icon_url }}
  PACKAGE_NAME: com.web2apk.${{ github.run_number }}

# ============================================
# JOBS
# ============================================
jobs:
  build:
    name: Build Web to APK
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ─── Checkout Repository ──────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ─── Setup Java ───────────────────────────────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ─── Setup Android SDK ────────────────────────
      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      # ─── Setup Node.js ────────────────────────────
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ─── Install Dependencies ─────────────────────
      - name: 📥 Install Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y imagemagick webp
          npm install -g cordova @capacitor/cli @capacitor/core @capacitor/android

      # ─── Download Icon ────────────────────────────
      - name: 🖼️ Download App Icon
        run: |
          echo "📥 Downloading icon from: $ICON_URL"
          mkdir -p assets
          
          # Download icon
          wget -O assets/icon_original.png "$ICON_URL" || \
          curl -L -o assets/icon_original.png "$ICON_URL"
          
          # Check if download success
          if [ -f assets/icon_original.png ]; then
            echo "✅ Icon downloaded successfully"
            file assets/icon_original.png
          else
            echo "❌ Failed to download icon, using default"
            # Create default icon using ImageMagick
            convert -size 512x512 xc:#6C5CE7 \
              -fill white -font Helvetica -pointsize 200 \
              -gravity center -annotate 0 "APK" \
              assets/icon_original.png
          fi

      # ─── Generate Icons ───────────────────────────
      - name: 🎨 Generate Icon Sizes
        run: |
          mkdir -p res/icon/android
          
          # Generate multiple icon sizes
          for size in 48 72 96 144 192 512; do
            convert assets/icon_original.png -resize ${size}x${size} \
              res/icon/android/icon-${size}.png
            echo "✅ Generated icon-${size}.png"
          done
          
          # Copy to main icon
          cp assets/icon_original.png res/icon/icon.png
          echo "✅ All icons generated"

      # ─── Create Web App ───────────────────────────
      - name: 🌐 Create WebView App
        run: |
          echo "📱 Creating Android WebView app for: $WEB_URL"
          
          # Create project directory
          mkdir -p web2apk-project
          cd web2apk-project
          
          # Initialize Android project structure
          mkdir -p app/src/main/java/com/web2apk/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p app/src/main/res/xml
          mkdir -p gradle/wrapper

      # ─── Create AndroidManifest.xml ───────────────
      - name: 📋 Create AndroidManifest.xml
        run: |
          cat > web2apk-project/app/src/main/AndroidManifest.xml << 'MANIFEST_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="${{ env.PACKAGE_NAME }}">
              
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />
              
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="${{ env.APP_NAME }}"
                  android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true"
                  android:theme="@style/AppTheme">
                  
                  <activity
                      android:name=".MainActivity"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST_EOF
          
          echo "✅ AndroidManifest.xml created"

      # ─── Create MainActivity.java ─────────────────
      - name: 📝 Create MainActivity.java
        run: |
          cat > web2apk-project/app/src/main/java/com/web2apk/app/MainActivity.java << 'JAVA_EOF'
          package com.web2apk.app;
          
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebSettings;
          import android.webkit.WebChromeClient;
          import android.view.View;
          import android.view.Window;
          import android.view.WindowManager;
          import android.graphics.Color;
          
          public class MainActivity extends Activity {
              private WebView webView;
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  // Fullscreen
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(
                      WindowManager.LayoutParams.FLAG_FULLSCREEN,
                      WindowManager.LayoutParams.FLAG_FULLSCREEN
                  );
                  
                  webView = new WebView(this);
                  setContentView(webView);
                  
                  // WebView Settings
                  WebSettings webSettings = webView.getSettings();
                  webSettings.setJavaScriptEnabled(true);
                  webSettings.setDomStorageEnabled(true);
                  webSettings.setAllowFileAccess(true);
                  webSettings.setLoadWithOverviewMode(true);
                  webSettings.setUseWideViewPort(true);
                  webSettings.setSupportZoom(true);
                  webSettings.setBuiltInZoomControls(true);
                  webSettings.setDisplayZoomControls(false);
                  webSettings.setCacheMode(WebSettings.LOAD_DEFAULT);
                  webSettings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  
                  // WebView Client
                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, String url) {
                          view.loadUrl(url);
                          return true;
                      }
                      
                      @Override
                      public void onPageFinished(WebView view, String url) {
                          super.onPageFinished(view, url);
                      }
                  });
                  
                  webView.setWebChromeClient(new WebChromeClient());
                  
                  // Load URL
                  webView.loadUrl("${{ env.WEB_URL }}");
              }
              
              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          JAVA_EOF
          
          echo "✅ MainActivity.java created"

      # ─── Create Layout ────────────────────────────
      - name: 📐 Create Layout
        run: |
          cat > web2apk-project/app/src/main/res/layout/activity_main.xml << 'LAYOUT_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <WebView xmlns:android="http://schemas.android.com/apk/res/android"
              android:id="@+id/webview"
              android:layout_width="match_parent"
              android:layout_height="match_parent" />
          LAYOUT_EOF
          
          echo "✅ Layout created"

      # ─── Create Styles ────────────────────────────
      - name: 🎨 Create Styles
        run: |
          cat > web2apk-project/app/src/main/res/values/styles.xml << 'STYLES_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="@android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:statusBarColor">#6C5CE7</item>
                  <item name="android:navigationBarColor">#6C5CE7</item>
              </style>
          </resources>
          STYLES_EOF
          
          cat > web2apk-project/app/src/main/res/values/colors.xml << 'COLORS_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#6C5CE7</color>
              <color name="colorPrimaryDark">#5A4BD1</color>
              <color name="colorAccent">#00CEC9</color>
          </resources>
          COLORS_EOF
          
          echo "✅ Styles created"

      # ─── Create build.gradle ──────────────────────
      - name: 🔧 Create build.gradle
        run: |
          # Project-level build.gradle
          cat > web2apk-project/build.gradle << 'BUILD_EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.0'
              }
          }
          
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          BUILD_EOF
          
          # App-level build.gradle
          cat > web2apk-project/app/build.gradle << 'APP_BUILD_EOF'
          apply plugin: 'com.android.application'
          
          android {
              namespace '${{ env.PACKAGE_NAME }}'
              compileSdk 34
              
              defaultConfig {
                  applicationId "${{ env.PACKAGE_NAME }}"
                  minSdk 21
                  targetSdk 34
                  versionCode ${{ github.run_number }}
                  versionName "1.0"
              }
              
              buildTypes {
                  release {
                      minifyEnabled true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
                  }
                  debug {
                      minifyEnabled false
                  }
              }
              
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.webkit:webkit:1.9.0'
          }
          APP_BUILD_EOF
          
          echo "✅ build.gradle created"

      # ─── Create settings.gradle ───────────────────
      - name: ⚙️ Create settings.gradle
        run: |
          cat > web2apk-project/settings.gradle << 'SETTINGS_EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = 'Web2APK'
          include ':app'
          SETTINGS_EOF
          
          echo "✅ settings.gradle created"

      # ─── Create gradle.properties ─────────────────
      - name: 📝 Create gradle.properties
        run: |
          cat > web2apk-project/gradle.properties << 'PROPS_EOF'
          org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          PROPS_EOF
          
          echo "✅ gradle.properties created"

      # ─── Setup Gradle Wrapper ─────────────────────
      - name: 📦 Setup Gradle Wrapper
        run: |
          cd web2apk-project
          gradle wrapper --gradle-version 8.5
          echo "✅ Gradle wrapper created"

      # ─── Copy Icons to Project ────────────────────
      - name: 🖼️ Copy Icons to Project
        run: |
          # Copy icons to mipmap folders
          cp res/icon/android/icon-48.png web2apk-project/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp res/icon/android/icon-72.png web2apk-project/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp res/icon/android/icon-96.png web2apk-project/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp res/icon/android/icon-144.png web2apk-project/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp res/icon/android/icon-192.png web2apk-project/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          
          echo "✅ Icons copied to project"

      # ─── Build APK ────────────────────────────────
      - name: 🔨 Build APK
        run: |
          cd web2apk-project
          
          echo "🔨 Building APK..."
          chmod +x gradlew
          
          # Build debug APK
          ./gradlew assembleDebug --no-daemon --stacktrace
          
          echo "✅ APK Build complete!"
          
          # List generated APKs
          find . -name "*.apk" -type f

      # ─── Rename APK ───────────────────────────────
      - name: 📱 Rename APK
        run: |
          APK_FILE=$(find web2apk-project -name "*.apk" -type f | head -1)
          
          if [ -z "$APK_FILE" ]; then
            echo "❌ No APK found!"
            exit 1
          fi
          
          # Clean app name for filename
          CLEAN_NAME=$(echo "${{ env.APP_NAME }}" | sed 's/[^a-zA-Z0-9]/_/g')
          APK_NAME="${CLEAN_NAME}_v1.0_web2apk.apk"
          
          cp "$APK_FILE" "./$APK_NAME"
          
          echo "✅ APK renamed to: $APK_NAME"
          ls -lh "./$APK_NAME"

      # ─── Upload APK Artifact ──────────────────────
      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Web2APK-${{ env.APP_NAME }}
          path: ./*.apk
          retention-days: 7
          compression-level: 6

      # ─── Build Summary ────────────────────────────
      - name: 📊 Build Summary
        run: |
          APK_FILE=$(find . -name "*.apk" -type f -not -path "*/build/*" | head -1)
          APK_SIZE=$(du -h "$APK_FILE" | cut -f1)
          
          echo "============================================"
          echo "🎉 BUILD COMPLETE!"
          echo "============================================"
          echo "📱 App Name : ${{ env.APP_NAME }}"
          echo "🌐 URL      : ${{ env.WEB_URL }}"
          echo "📦 Package  : ${{ env.PACKAGE_NAME }}"
          echo "💾 Size     : $APK_SIZE"
          echo "📅 Build #  : ${{ github.run_number }}"
          echo "============================================"
